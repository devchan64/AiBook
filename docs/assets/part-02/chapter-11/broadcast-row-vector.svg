<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">A row-shaped vector is broadcast across rows of a feature matrix</title>
  <desc id="desc">A matrix with shape four by three is combined with a vector of shape three, applying the vector to every row.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="470" fill="#ffffff"/>
  <text class="title" x="30" y="42">A shape (3,) vector can be applied to each row of shape (4, 3)</text>
  <text class="subtitle" x="30" y="70">The last dimension matches, so the vector is used once per row.</text>

  <rect x="44" y="112" width="314" height="270" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="68" y="146">features</text>
  <text class="label" x="68" y="174">shape (4, 3)</text>
  <g transform="translate(80 208)">
    <rect x="0" y="0" width="228" height="144" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="76" y1="0" x2="76" y2="144"/>
      <line x1="152" y1="0" x2="152" y2="144"/>
      <line x1="0" y1="36" x2="228" y2="36"/>
      <line x1="0" y1="72" x2="228" y2="72"/>
      <line x1="0" y1="108" x2="228" y2="108"/>
    </g>
    <rect x="0" y="36" width="228" height="36" fill="#dcfce7" opacity="0.55" stroke="#16a34a" stroke-width="1.5"/>
    <text class="value" x="38" y="24" text-anchor="middle">1.0</text>
    <text class="value" x="114" y="24" text-anchor="middle">0.2</text>
    <text class="value" x="190" y="24" text-anchor="middle">7.0</text>
    <text class="value" x="38" y="60" text-anchor="middle">0.8</text>
    <text class="value" x="114" y="60" text-anchor="middle">0.4</text>
    <text class="value" x="190" y="60" text-anchor="middle">6.5</text>
    <text class="value" x="38" y="96" text-anchor="middle">0.3</text>
    <text class="value" x="114" y="96" text-anchor="middle">0.9</text>
    <text class="value" x="190" y="96" text-anchor="middle">8.1</text>
    <text class="value" x="38" y="132" text-anchor="middle">0.5</text>
    <text class="value" x="114" y="132" text-anchor="middle">0.1</text>
    <text class="value" x="190" y="132" text-anchor="middle">5.8</text>
  </g>

  <text class="code" x="398" y="256" text-anchor="middle">+</text>
  <rect x="428" y="196" width="212" height="82" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text class="panel-title" x="452" y="224">feature_offset</text>
  <text class="label" x="452" y="250">shape (3,)</text>
  <text class="value" x="452" y="270">[0.1, 0.2, 0.3]</text>
  <line x1="534" y1="292" x2="534" y2="342" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="430" y="350" width="208" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="label" x="534" y="372" text-anchor="middle">applied to every row</text>

  <line x1="666" y1="248" x2="714" y2="248" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="730" y="112" width="146" height="270" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="panel-title" x="754" y="146">result</text>
  <text class="label" x="754" y="174">shape (4, 3)</text>
  <text class="value" x="754" y="224">row 0</text>
  <text class="value" x="754" y="260">row 1</text>
  <text class="value" x="754" y="296">row 2</text>
  <text class="value" x="754" y="332">row 3</text>

  <rect x="120" y="414" width="680" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="438" text-anchor="middle">Broadcasting works when shapes are compatible, not just visually related.</text>
</svg>
