<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Indexing, slicing, and axis read different parts of the same array</title>
  <desc id="desc">A two-dimensional array is shown with row and column indices. One cell, one row slice, one column slice, and the two axes are highlighted.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="520" fill="#ffffff"/>
  <text class="title" x="30" y="42">Index, slice, and axis answer different questions</text>
  <text class="subtitle" x="30" y="70">Index chooses a position. Slice chooses a range. Axis chooses a direction of calculation.</text>

  <rect x="42" y="112" width="410" height="308" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="66" y="146">array shape = (3, 4)</text>
  <text class="label" x="66" y="174">axis 0: rows, axis 1: columns</text>

  <g transform="translate(104 210)">
    <text class="label" x="-42" y="27">row 0</text>
    <text class="label" x="-42" y="75">row 1</text>
    <text class="label" x="-42" y="123">row 2</text>
    <text class="label" x="23" y="-18">col 0</text>
    <text class="label" x="83" y="-18">col 1</text>
    <text class="label" x="143" y="-18">col 2</text>
    <text class="label" x="203" y="-18">col 3</text>

    <rect x="0" y="0" width="240" height="144" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="60" y1="0" x2="60" y2="144"/>
      <line x1="120" y1="0" x2="120" y2="144"/>
      <line x1="180" y1="0" x2="180" y2="144"/>
      <line x1="0" y1="48" x2="240" y2="48"/>
      <line x1="0" y1="96" x2="240" y2="96"/>
    </g>
    <rect x="120" y="48" width="60" height="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="96" width="240" height="48" fill="#dcfce7" opacity="0.7" stroke="#16a34a" stroke-width="2"/>
    <rect x="180" y="0" width="60" height="144" fill="#ffedd5" opacity="0.75" stroke="#f97316" stroke-width="2"/>

    <text class="value" x="30" y="30" text-anchor="middle">10</text>
    <text class="value" x="90" y="30" text-anchor="middle">11</text>
    <text class="value" x="150" y="30" text-anchor="middle">12</text>
    <text class="value" x="210" y="30" text-anchor="middle">13</text>
    <text class="value" x="30" y="78" text-anchor="middle">20</text>
    <text class="value" x="90" y="78" text-anchor="middle">21</text>
    <text class="value" x="150" y="78" text-anchor="middle">22</text>
    <text class="value" x="210" y="78" text-anchor="middle">23</text>
    <text class="value" x="30" y="126" text-anchor="middle">30</text>
    <text class="value" x="90" y="126" text-anchor="middle">31</text>
    <text class="value" x="150" y="126" text-anchor="middle">32</text>
    <text class="value" x="210" y="126" text-anchor="middle">33</text>
  </g>

  <line x1="130" y1="384" x2="224" y2="384" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="122" y="394" width="124" height="28" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text class="label" x="184" y="413" text-anchor="middle">axis 1: columns</text>
  <line x1="400" y1="224" x2="400" y2="316" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="352" y="332" width="96" height="28" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text class="label" x="400" y="351" text-anchor="middle">axis 0: rows</text>

  <rect x="494" y="112" width="384" height="308" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="518" y="146">Three reading actions</text>
  <text class="label" x="518" y="174">The same array can be read by position, range, or direction.</text>

  <rect x="530" y="210" width="304" height="44" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="code" x="550" y="238">x[1, 2]</text>
  <text class="label" x="646" y="238">one value at row 1, column 2</text>

  <rect x="530" y="270" width="304" height="44" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="code" x="550" y="298">x[2, :]</text>
  <text class="label" x="646" y="298">one full row</text>

  <rect x="530" y="330" width="304" height="44" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text class="code" x="550" y="358">x[:, 3]</text>
  <text class="label" x="646" y="358">one full column</text>

  <rect x="116" y="456" width="688" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="480" text-anchor="middle">Use commas to say which dimension you are selecting from.</text>
</svg>
