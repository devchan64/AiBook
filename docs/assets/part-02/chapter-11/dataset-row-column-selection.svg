<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Rows often represent samples and columns often represent features</title>
  <desc id="desc">A small feature matrix highlights one row as a sample and one column as a feature to explain dataset-style array reading.</desc>
  <defs>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="540" fill="#ffffff"/>
  <text class="title" x="30" y="42">Dataset arrays are often read by rows and columns</text>
  <text class="subtitle" x="30" y="70">A row can be one sample. A column can be one feature across all samples.</text>

  <rect x="44" y="112" width="832" height="330" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="68" y="146">features shape = (4, 3)</text>
  <text class="label" x="68" y="174">4 samples, 3 features</text>

  <g transform="translate(152 212)">
    <text class="label" x="-70" y="26">sample 0</text>
    <text class="label" x="-70" y="74">sample 1</text>
    <text class="label" x="-70" y="122">sample 2</text>
    <text class="label" x="-70" y="170">sample 3</text>
    <text class="label" x="44" y="-18" text-anchor="middle">feature 0</text>
    <text class="label" x="132" y="-18" text-anchor="middle">feature 1</text>
    <text class="label" x="220" y="-18" text-anchor="middle">feature 2</text>

    <rect x="0" y="0" width="264" height="192" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="88" y1="0" x2="88" y2="192"/>
      <line x1="176" y1="0" x2="176" y2="192"/>
      <line x1="0" y1="48" x2="264" y2="48"/>
      <line x1="0" y1="96" x2="264" y2="96"/>
      <line x1="0" y1="144" x2="264" y2="144"/>
    </g>
    <rect x="0" y="48" width="264" height="48" fill="#dcfce7" opacity="0.7" stroke="#16a34a" stroke-width="2"/>
    <rect x="88" y="0" width="88" height="192" fill="#dbeafe" opacity="0.75" stroke="#2563eb" stroke-width="2"/>

    <text class="value" x="44" y="30" text-anchor="middle">1.0</text>
    <text class="value" x="132" y="30" text-anchor="middle">0.2</text>
    <text class="value" x="220" y="30" text-anchor="middle">7.0</text>
    <text class="value" x="44" y="78" text-anchor="middle">0.8</text>
    <text class="value" x="132" y="78" text-anchor="middle">0.4</text>
    <text class="value" x="220" y="78" text-anchor="middle">6.5</text>
    <text class="value" x="44" y="126" text-anchor="middle">0.3</text>
    <text class="value" x="132" y="126" text-anchor="middle">0.9</text>
    <text class="value" x="220" y="126" text-anchor="middle">8.1</text>
    <text class="value" x="44" y="174" text-anchor="middle">0.5</text>
    <text class="value" x="132" y="174" text-anchor="middle">0.1</text>
    <text class="value" x="220" y="174" text-anchor="middle">5.8</text>
  </g>

  <rect x="500" y="198" width="312" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="code" x="522" y="224">features[1, :]</text>
  <text class="label" x="522" y="244">one sample row</text>

  <rect x="500" y="286" width="312" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="code" x="522" y="312">features[:, 1]</text>
  <text class="label" x="522" y="332">one feature column</text>

  <rect x="136" y="470" width="648" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="494" text-anchor="middle">Rows and columns are not just visual directions; they are modeling choices.</text>
</svg>
