<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">Slice notation selects a range from start to stop before the stop position</title>
  <desc id="desc">A one-dimensional array with six values shows how x[1:5:2] selects positions one and three, starting at one, stopping before five, and stepping by two.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="920" height="460" fill="#ffffff"/>
  <text class="title" x="30" y="42">Slice notation keeps a range, not just one position</text>
  <text class="subtitle" x="30" y="70">Read x[start:stop:step] as start here, stop before there, move by this step.</text>

  <rect x="52" y="112" width="816" height="260" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="code" x="82" y="150">x[1:5:2]</text>
  <text class="label" x="210" y="150">start at index 1, stop before index 5, step by 2</text>

  <g transform="translate(116 194)">
    <text class="small" x="30" y="-20" text-anchor="middle">idx 0</text>
    <text class="small" x="112" y="-20" text-anchor="middle">idx 1</text>
    <text class="small" x="194" y="-20" text-anchor="middle">idx 2</text>
    <text class="small" x="276" y="-20" text-anchor="middle">idx 3</text>
    <text class="small" x="358" y="-20" text-anchor="middle">idx 4</text>
    <text class="small" x="440" y="-20" text-anchor="middle">idx 5</text>

    <rect x="0" y="0" width="60" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="82" y="0" width="60" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="164" y="0" width="60" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="246" y="0" width="60" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="328" y="0" width="60" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="410" y="0" width="60" height="52" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4"/>

    <text class="value" x="30" y="33" text-anchor="middle">82</text>
    <text class="value" x="112" y="33" text-anchor="middle">75</text>
    <text class="value" x="194" y="33" text-anchor="middle">45</text>
    <text class="value" x="276" y="33" text-anchor="middle">90</text>
    <text class="value" x="358" y="33" text-anchor="middle">61</text>
    <text class="value" x="440" y="33" text-anchor="middle">70</text>

    <line x1="112" y1="72" x2="276" y2="72" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="label" x="194" y="104" text-anchor="middle">step by 2</text>
    <text class="label" x="112" y="136" text-anchor="middle">kept</text>
    <text class="label" x="276" y="136" text-anchor="middle">kept</text>
    <text class="label" x="440" y="136" text-anchor="middle">stop before this index</text>
  </g>

  <rect x="138" y="402" width="644" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="425" text-anchor="middle">The stop index is a boundary, not a selected value.</text>
</svg>
