<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">Axis controls the direction of reduction</title>
  <desc id="desc">A two-dimensional array is reduced by sum along axis zero or axis one, producing column sums or row sums.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="470" fill="#ffffff"/>
  <text class="title" x="30" y="42">Axis decides which direction is collapsed</text>
  <text class="subtitle" x="30" y="70">A reduction such as sum or mean removes one direction and keeps the other result shape.</text>

  <rect x="44" y="118" width="250" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="68" y="152">data</text>
  <text class="label" x="68" y="180">shape = (3, 4)</text>
  <g transform="translate(74 214)">
    <rect x="0" y="0" width="172" height="96" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="43" y1="0" x2="43" y2="96"/>
      <line x1="86" y1="0" x2="86" y2="96"/>
      <line x1="129" y1="0" x2="129" y2="96"/>
      <line x1="0" y1="32" x2="172" y2="32"/>
      <line x1="0" y1="64" x2="172" y2="64"/>
    </g>
    <text class="value" x="21" y="22" text-anchor="middle">10</text>
    <text class="value" x="64" y="22" text-anchor="middle">11</text>
    <text class="value" x="107" y="22" text-anchor="middle">12</text>
    <text class="value" x="150" y="22" text-anchor="middle">13</text>
    <text class="value" x="21" y="54" text-anchor="middle">20</text>
    <text class="value" x="64" y="54" text-anchor="middle">21</text>
    <text class="value" x="107" y="54" text-anchor="middle">22</text>
    <text class="value" x="150" y="54" text-anchor="middle">23</text>
    <text class="value" x="21" y="86" text-anchor="middle">30</text>
    <text class="value" x="64" y="86" text-anchor="middle">31</text>
    <text class="value" x="107" y="86" text-anchor="middle">32</text>
    <text class="value" x="150" y="86" text-anchor="middle">33</text>
  </g>

  <rect x="312" y="148" width="78" height="28" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="code" x="351" y="168" text-anchor="middle">axis=0</text>
  <line x1="314" y1="188" x2="382" y2="188" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="312" y="252" width="78" height="28" rx="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="code" x="351" y="272" text-anchor="middle">axis=1</text>
  <line x1="314" y1="292" x2="382" y2="292" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="404" y="118" width="220" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="428" y="152">sum(axis=0)</text>
  <text class="label" x="428" y="180">collapse rows, keep columns</text>
  <g transform="translate(438 226)">
    <rect x="0" y="0" width="172" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text class="value" x="21" y="27" text-anchor="middle">60</text>
    <text class="value" x="64" y="27" text-anchor="middle">63</text>
    <text class="value" x="107" y="27" text-anchor="middle">66</text>
    <text class="value" x="150" y="27" text-anchor="middle">69</text>
  </g>
  <text class="label" x="428" y="294">result shape = (4,)</text>

  <rect x="656" y="118" width="220" height="250" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="680" y="152">sum(axis=1)</text>
  <text class="label" x="680" y="180">collapse columns, keep rows</text>
  <g transform="translate(722 214)">
    <rect x="0" y="0" width="88" height="36" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <rect x="0" y="42" width="88" height="36" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <rect x="0" y="84" width="88" height="36" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text class="value" x="44" y="23" text-anchor="middle">46</text>
    <text class="value" x="44" y="65" text-anchor="middle">86</text>
    <text class="value" x="44" y="107" text-anchor="middle">126</text>
  </g>
  <text class="label" x="680" y="356">result shape = (3,)</text>

  <rect x="98" y="398" width="724" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="422" text-anchor="middle">Axis is not just a direction on the page; it is a dimension in the shape tuple.</text>
</svg>
