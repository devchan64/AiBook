<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Scalar broadcasting over a one-dimensional array</title>
  <desc id="desc">A scalar value is applied to each element of a one-dimensional array, producing a new array with the same shape.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .value { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .code { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1d4ed8; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="430" fill="#ffffff"/>
  <text class="title" x="30" y="42">Broadcasting applies a smaller value across a larger array</text>
  <text class="subtitle" x="30" y="70">A scalar can act like it is available at every element position.</text>

  <rect x="56" y="116" width="808" height="230" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="86" y="152">scores + 10</text>
  <text class="label" x="86" y="180">same scalar, repeated element-wise by the operation</text>

  <g transform="translate(116 224)">
    <rect x="0" y="0" width="64" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="88" y="0" width="64" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="176" y="0" width="64" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text class="value" x="32" y="34" text-anchor="middle">82</text>
    <text class="value" x="120" y="34" text-anchor="middle">75</text>
    <text class="value" x="208" y="34" text-anchor="middle">45</text>
    <text class="label" x="120" y="82" text-anchor="middle">shape (3,)</text>
  </g>

  <text class="code" x="404" y="258" text-anchor="middle">+</text>
  <rect x="448" y="224" width="72" height="52" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text class="value" x="484" y="258" text-anchor="middle">10</text>
  <text class="label" x="484" y="306" text-anchor="middle">scalar</text>

  <line x1="548" y1="250" x2="584" y2="250" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(612 224)">
    <rect x="0" y="0" width="64" height="52" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="88" y="0" width="64" height="52" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="176" y="0" width="64" height="52" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text class="value" x="32" y="34" text-anchor="middle">92</text>
    <text class="value" x="120" y="34" text-anchor="middle">85</text>
    <text class="value" x="208" y="34" text-anchor="middle">55</text>
    <text class="label" x="120" y="82" text-anchor="middle">shape (3,)</text>
  </g>

  <rect x="120" y="372" width="680" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="396" text-anchor="middle">Broadcasting changes how the operation is applied across the array.</text>
</svg>
