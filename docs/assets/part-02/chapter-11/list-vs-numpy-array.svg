<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Python list and NumPy array use the plus sign differently</title>
  <desc id="desc">Python list plus list concatenates two sequences, while NumPy array plus array adds values element by element.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 19px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .value { font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e40af; }
      .note { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="920" height="420" fill="#ffffff"/>
  <text class="title" x="30" y="42">The same plus sign can mean different operations</text>
  <text class="subtitle" x="30" y="70">A Python list is a general container. A NumPy array is a calculation-oriented numeric structure.</text>

  <rect x="36" y="112" width="392" height="218" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="60" y="146">Python list: concatenate</text>
  <text class="label" x="60" y="174">list + list joins the two lists</text>

  <rect x="70" y="205" width="46" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="value" x="93" y="232" text-anchor="middle">82</text>
  <rect x="124" y="205" width="46" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="value" x="147" y="232" text-anchor="middle">75</text>
  <rect x="178" y="205" width="46" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="value" x="201" y="232" text-anchor="middle">45</text>

  <text class="mono" x="244" y="232">+</text>

  <rect x="276" y="205" width="46" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="value" x="299" y="232" text-anchor="middle">82</text>
  <rect x="330" y="205" width="46" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text class="value" x="353" y="232" text-anchor="middle">75</text>

  <line x1="220" y1="274" x2="220" y2="298" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="note" x="220" y="320" text-anchor="middle">longer list, not numeric addition</text>

  <rect x="492" y="112" width="392" height="218" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="panel-title" x="516" y="146">NumPy array: element-wise add</text>
  <text class="label" x="516" y="174">array + array adds values at matching positions</text>

  <rect x="526" y="205" width="52" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="value" x="552" y="232" text-anchor="middle">82</text>
  <rect x="588" y="205" width="52" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="value" x="614" y="232" text-anchor="middle">75</text>
  <rect x="650" y="205" width="52" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="value" x="676" y="232" text-anchor="middle">45</text>

  <text class="mono" x="724" y="232">+</text>

  <rect x="756" y="205" width="52" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="value" x="782" y="232" text-anchor="middle">82</text>
  <rect x="818" y="205" width="52" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text class="value" x="844" y="232" text-anchor="middle">75</text>

  <line x1="690" y1="274" x2="690" y2="298" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="note" x="690" y="320" text-anchor="middle">same-shape numeric operation</text>

  <rect x="96" y="356" width="728" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text class="note" x="460" y="381" text-anchor="middle">Ask whether the structure is storing values or computing with values.</text>
</svg>
