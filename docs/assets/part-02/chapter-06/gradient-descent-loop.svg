<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Gradient descent repeats small downhill updates</title>
  <desc id="desc">경사하강법이 현재 파라미터에서 손실의 변화 방향을 읽고, 학습률만큼 조금 이동한 뒤, 다시 손실을 확인하는 반복 흐름을 보여 주는 도식입니다.</desc>
  <rect width="920" height="540" fill="#ffffff"/>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-gray-small" markerWidth="7" markerHeight="7" refX="6.4" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="7" markerHeight="7" refX="6.4" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <text x="42" y="48" font-size="24" font-weight="700" fill="#111827">Gradient descent repeats small downhill updates</text>
    <text x="42" y="80" font-size="16" fill="#4b5563">It does not jump to the answer. It uses local slope information and repeats.</text>

    <rect x="54" y="118" width="406" height="300" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="82" y="154" font-size="19" font-weight="700" fill="#334155">Loss curve view</text>
    <text x="82" y="181" font-size="14" fill="#475569">move toward lower loss</text>

    <line x1="96" y1="358" x2="414" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <line x1="116" y1="374" x2="116" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="365" y="388" font-size="13" fill="#475569">parameter</text>
    <text x="70" y="220" font-size="13" fill="#475569">loss</text>

    <path d="M118 236 C178 372, 306 372, 396 236" fill="none" stroke="#0f766e" stroke-width="4"/>

    <circle cx="160" cy="298" r="7" fill="#ef4444"/>
    <rect x="136" y="270" width="42" height="16" rx="4" fill="#f8fafc"/>
    <text x="139" y="282" font-size="13" font-weight="700" fill="#991b1b">start</text>

    <circle cx="230" cy="346" r="7" fill="#f97316"/>
    <rect x="212" y="323" width="48" height="16" rx="4" fill="#f8fafc"/>
    <text x="215" y="335" font-size="13" font-weight="700" fill="#9a3412">step 1</text>

    <circle cx="292" cy="352" r="7" fill="#22c55e"/>
    <rect x="276" y="324" width="48" height="16" rx="4" fill="#f8fafc"/>
    <text x="279" y="336" font-size="13" font-weight="700" fill="#166534">step 2</text>

    <path d="M169 307 C188 331, 204 343, 222 345" fill="none" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M238 350 C252 356, 266 358, 284 354" fill="none" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow-blue)"/>

    <rect x="504" y="118" width="362" height="300" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="532" y="154" font-size="19" font-weight="700" fill="#1e3a8a">Update loop</text>
    <text x="532" y="181" font-size="14" fill="#334155">read direction, choose step size, update</text>

    <rect x="552" y="212" width="118" height="54" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <text x="574" y="235" font-size="15" font-weight="700" fill="#1e40af">current</text>
    <text x="574" y="255" font-size="13" fill="#334155">parameters</text>

    <line x1="670" y1="239" x2="720" y2="239" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>

    <rect x="730" y="212" width="96" height="54" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <text x="748" y="235" font-size="15" font-weight="700" fill="#1e40af">gradient</text>
    <text x="752" y="255" font-size="13" fill="#334155">direction</text>

    <rect x="628" y="300" width="122" height="54" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="650" y="323" font-size="15" font-weight="700" fill="#854d0e">learning rate</text>
    <text x="652" y="343" font-size="13" fill="#334155">step size</text>

    <path d="M778 268 C794 294, 780 320, 754 327" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray-small)"/>
    <path d="M628 327 C586 326, 564 300, 568 266" fill="none" stroke="#2563eb" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arrow-blue)"/>

    <rect x="98" y="454" width="724" height="46" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="136" y="483" font-size="15" fill="#334155">Key idea: move opposite the gradient, by a small learning-rate step, then measure loss again.</text>
  </g>
</svg>
