<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">A loss function turns prediction errors into numbers to optimize</title>
  <desc id="desc">모델 예측과 실제값의 차이를 손실로 계산하고, 여러 샘플의 손실을 평균해 목적 함수로 사용하는 흐름을 보여 주는 도식입니다.</desc>
  <rect width="920" height="500" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <text x="42" y="48" font-size="24" font-weight="700" fill="#111827">Loss turns model mistakes into a number</text>
    <text x="42" y="80" font-size="16" fill="#4b5563">A single prediction has a loss. A training objective combines many losses.</text>

    <rect x="48" y="120" width="820" height="126" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="72" y="152" font-size="18" font-weight="700" fill="#334155">One training example</text>

    <rect x="92" y="176" width="140" height="46" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="122" y="205" font-size="16" font-weight="700" fill="#1e40af">input x</text>

    <line x1="244" y1="199" x2="304" y2="199" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="316" y="176" width="140" height="46" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="356" y="205" font-size="16" font-weight="700" fill="#3730a3">model</text>

    <line x1="468" y1="199" x2="528" y2="199" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="540" y="176" width="132" height="46" rx="9" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="574" y="205" font-size="16" font-weight="700" fill="#334155">ŷ = 8</text>

    <rect x="704" y="176" width="132" height="46" rx="9" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="738" y="205" font-size="16" font-weight="700" fill="#166534">y = 10</text>

    <line x1="606" y1="238" x2="606" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="770" y1="238" x2="770" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="248" y="300" width="424" height="86" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="282" y="332" font-size="19" font-weight="700" fill="#9a3412">loss function</text>
    <text x="282" y="360" font-size="15" fill="#334155">example: squared error = (10 - 8)² = 4</text>

    <line x1="672" y1="343" x2="730" y2="343" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="742" y="300" width="126" height="86" rx="14" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="772" y="332" font-size="18" font-weight="700" fill="#854d0e">loss</text>
    <text x="790" y="362" font-size="24" font-weight="700" fill="#854d0e">4</text>

    <rect x="70" y="420" width="780" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="108" y="448" font-size="15" fill="#334155">Training objective: combine losses from many examples, then minimize the total or average loss.</text>
  </g>
</svg>
