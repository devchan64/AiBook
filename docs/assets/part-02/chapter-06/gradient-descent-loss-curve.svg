<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Gradient descent on a loss curve</title>
  <desc id="desc">손실 곡선 위에서 시작점에서 작은 단계로 손실이 낮은 방향으로 이동하는 경사하강법의 직관을 보여 주는 차트입니다.</desc>
  <rect width="760" height="430" fill="#ffffff"/>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="7" markerHeight="7" refX="6.4" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <text x="42" y="48" font-size="24" font-weight="700" fill="#111827">Loss curve view</text>
    <text x="42" y="80" font-size="16" fill="#4b5563">Gradient descent uses local slope information and moves toward lower loss.</text>

    <rect x="64" y="116" width="632" height="244" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="128" y1="306" x2="620" y2="306" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <line x1="160" y1="328" x2="160" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="562" y="338" font-size="14" fill="#475569">parameter</text>
    <text x="94" y="160" font-size="14" fill="#475569">loss</text>

    <path d="M162 176 C230 366, 418 366, 552 176" fill="none" stroke="#0f766e" stroke-width="4"/>

    <circle cx="238" cy="236" r="8" fill="#ef4444"/>
    <rect x="208" y="206" width="48" height="18" rx="4" fill="#f8fafc"/>
    <text x="212" y="220" font-size="14" font-weight="700" fill="#991b1b">start</text>

    <circle cx="332" cy="288" r="8" fill="#f97316"/>
    <rect x="304" y="258" width="54" height="18" rx="4" fill="#f8fafc"/>
    <text x="308" y="272" font-size="14" font-weight="700" fill="#9a3412">step 1</text>

    <circle cx="426" cy="296" r="8" fill="#22c55e"/>
    <rect x="404" y="262" width="54" height="18" rx="4" fill="#f8fafc"/>
    <text x="408" y="276" font-size="14" font-weight="700" fill="#166534">step 2</text>

    <path d="M252 242 C280 272, 300 285, 320 288" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M344 291 C368 300, 392 302, 414 297" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>

    <rect x="116" y="376" width="528" height="34" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="150" y="398" font-size="15" fill="#334155">Key idea: move opposite the gradient, by a small learning-rate step.</text>
  </g>
</svg>
