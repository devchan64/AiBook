<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Bayes rule as belief update</title>
  <desc id="desc">베이즈 규칙을 사전 믿음, 관측 증거, 갱신된 믿음의 흐름으로 보여 주는 차트입니다.</desc>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Bayes rule: update belief with evidence</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">At this level, read Bayes rule as a pattern for changing belief after new evidence.</text>

  <g font-family="Arial, sans-serif">
    <rect x="52" y="152" width="210" height="112" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="99" y="190" font-size="20" font-weight="700" fill="#334155">prior belief</text>
    <text x="83" y="224" font-size="16" fill="#475569">what we believe before</text>
    <text x="110" y="248" font-size="16" fill="#475569">new observation</text>

    <path d="M274 208 L348 208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>

    <rect x="360" y="138" width="210" height="140" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="421" y="180" font-size="20" font-weight="700" fill="#1d4ed8">evidence</text>
    <text x="392" y="214" font-size="16" fill="#475569">new observed information</text>
    <text x="390" y="244" font-size="16" fill="#475569">that changes our belief</text>

    <path d="M582 208 L656 208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>

    <rect x="668" y="152" width="210" height="112" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="708" y="190" font-size="20" font-weight="700" fill="#047857">posterior belief</text>
    <text x="701" y="224" font-size="16" fill="#475569">what we believe after</text>
    <text x="730" y="248" font-size="16" fill="#475569">the evidence</text>

    <rect x="170" y="326" width="580" height="54" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="205" y="360" font-size="17" fill="#334155">Bayes rule is not just a formula. It is a disciplined update pattern.</text>
  </g>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
