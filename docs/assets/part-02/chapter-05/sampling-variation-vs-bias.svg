<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Sampling variation versus sampling bias</title>
  <desc id="desc">표본추출 변동과 표본 편향의 차이를 비교하는 차트입니다.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Sampling variation and sampling bias are different problems</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Variation means estimates move around. Bias means estimates are pushed in one direction.</text>

  <g font-family="Arial, sans-serif">
    <rect x="58" y="130" width="380" height="286" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="88" y="166" font-size="20" font-weight="700" fill="#334155">sampling variation</text>
    <line x1="248" y1="210" x2="248" y2="350" stroke="#10b981" stroke-width="4"/>
    <text x="208" y="198" font-size="15" font-weight="700" fill="#047857">true value</text>
    <line x1="210" y1="238" x2="210" y2="342" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 6"/>
    <line x1="248" y1="238" x2="248" y2="342" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 6"/>
    <line x1="286" y1="238" x2="286" y2="342" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="98" y="382" font-size="15" fill="#475569">different samples move around the true value</text>

    <rect x="482" y="130" width="380" height="286" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="512" y="166" font-size="20" font-weight="700" fill="#334155">sampling bias</text>
    <line x1="672" y1="210" x2="672" y2="350" stroke="#10b981" stroke-width="4"/>
    <text x="632" y="198" font-size="15" font-weight="700" fill="#047857">true value</text>
    <line x1="734" y1="238" x2="734" y2="342" stroke="#ef4444" stroke-width="3" stroke-dasharray="7 6"/>
    <line x1="766" y1="238" x2="766" y2="342" stroke="#ef4444" stroke-width="3" stroke-dasharray="7 6"/>
    <line x1="798" y1="238" x2="798" y2="342" stroke="#ef4444" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="522" y="382" font-size="15" fill="#475569">samples are systematically shifted away</text>
  </g>

  <rect x="174" y="448" width="572" height="44" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="206" y="476" font-family="Arial, sans-serif" font-size="16" fill="#334155">More data can reduce variation, but biased collection can still mislead.</text>
</svg>
