<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Sampling variation versus sampling bias</title>
  <desc id="desc">표본추출 변동과 표본 편향의 차이를 비교하는 차트입니다.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Sampling variation and sampling bias are different problems</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Variation means estimates move around. Bias means estimates are pushed in one direction.</text>

  <g font-family="Arial, sans-serif">
    <rect x="58" y="130" width="380" height="286" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="88" y="166" font-size="20" font-weight="700" fill="#334155">sampling variation</text>
    <line x1="108" y1="318" x2="388" y2="318" stroke="#94a3b8" stroke-width="2"/>
    <text x="200" y="198" font-size="15" font-weight="700" fill="#047857">true value</text>
    <line x1="248" y1="210" x2="248" y2="344" stroke="#10b981" stroke-width="4"/>
    <text x="117" y="238" font-size="14" fill="#64748b">sample estimates</text>
    <line x1="196" y1="254" x2="196" y2="318" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="226" y1="254" x2="226" y2="318" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="252" y1="254" x2="252" y2="318" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="281" y1="254" x2="281" y2="318" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="310" y1="254" x2="310" y2="318" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5"/>
    <circle cx="196" cy="318" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="226" cy="318" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="252" cy="318" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="281" cy="318" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="310" cy="318" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <path d="M196 354 C226 372, 280 372, 310 354" fill="none" stroke="#2563eb" stroke-width="2"/>
    <text x="104" y="386" font-size="15" fill="#475569">estimates scatter around the true value</text>

    <rect x="482" y="130" width="380" height="286" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="512" y="166" font-size="20" font-weight="700" fill="#334155">sampling bias</text>
    <line x1="532" y1="318" x2="812" y2="318" stroke="#94a3b8" stroke-width="2"/>
    <text x="624" y="198" font-size="15" font-weight="700" fill="#047857">true value</text>
    <line x1="672" y1="210" x2="672" y2="344" stroke="#10b981" stroke-width="4"/>
    <text x="706" y="238" font-size="14" fill="#64748b">shifted estimates</text>
    <line x1="724" y1="254" x2="724" y2="318" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="754" y1="254" x2="754" y2="318" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="784" y1="254" x2="784" y2="318" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
    <circle cx="724" cy="318" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <circle cx="754" cy="318" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <circle cx="784" cy="318" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <path d="M680 354 C716 377, 764 377, 798 354" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="528" y="386" font-size="15" fill="#475569">estimates are pushed away from the true value</text>
  </g>

  <rect x="174" y="448" width="572" height="44" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="206" y="476" font-family="Arial, sans-serif" font-size="16" fill="#334155">More data can reduce variation, but biased collection can still mislead.</text>
</svg>
