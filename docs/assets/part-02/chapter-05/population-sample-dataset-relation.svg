<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Population, sample, and dataset relation</title>
  <desc id="desc">모집단, 표본, 데이터셋의 포함 관계와 정리 흐름을 보여 주는 도식입니다.</desc>
  <rect width="920" height="540" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Population, sample, and dataset relation</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">A sample is part of the population. A dataset is the organized form of observed sample data.</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="132" width="780" height="270" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="100" y="168" font-size="20" font-weight="700" fill="#334155">population</text>
    <text x="100" y="198" font-size="15" fill="#475569">all cases we care about</text>

    <rect x="214" y="224" width="360" height="118" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="244" y="260" font-size="19" font-weight="700" fill="#1d4ed8">sample</text>
    <text x="244" y="290" font-size="15" fill="#475569">observed subset of the population</text>

    <path d="M590 282 L680 282" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>
    <text x="610" y="258" font-size="15" fill="#475569">organize</text>

    <rect x="698" y="220" width="118" height="128" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="724" y="254" font-size="18" font-weight="700" fill="#047857">dataset</text>
    <line x1="720" y1="278" x2="794" y2="278" stroke="#10b981" stroke-width="2"/>
    <line x1="720" y1="304" x2="794" y2="304" stroke="#10b981" stroke-width="2"/>
    <line x1="720" y1="330" x2="794" y2="330" stroke="#10b981" stroke-width="2"/>
    <line x1="745" y1="264" x2="745" y2="342" stroke="#10b981" stroke-width="2"/>
    <line x1="770" y1="264" x2="770" y2="342" stroke="#10b981" stroke-width="2"/>
  </g>

  <rect x="116" y="440" width="688" height="54" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="148" y="473" font-family="Arial, sans-serif" font-size="16" fill="#334155">Dataset does not mean the whole world. It is a structured record of collected sample data.</text>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
