<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Training and test data as samples</title>
  <desc id="desc">현실 세계의 데이터에서 수집 데이터, 훈련 데이터, 테스트 데이터가 표본으로 나뉘는 흐름을 보여 주는 차트입니다.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Training and test data are samples of reality</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">A model learns from one sample and is evaluated on another sample.</text>

  <g font-family="Arial, sans-serif">
    <rect x="52" y="128" width="210" height="230" rx="16" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="82" y="164" font-size="19" font-weight="700" fill="#334155">real world</text>
    <text x="82" y="192" font-size="15" fill="#475569">unknown population</text>
    <circle cx="92" cy="240" r="7" fill="#cbd5e1"/><circle cx="126" cy="224" r="7" fill="#cbd5e1"/><circle cx="160" cy="248" r="7" fill="#cbd5e1"/><circle cx="194" cy="230" r="7" fill="#cbd5e1"/><circle cx="228" cy="258" r="7" fill="#cbd5e1"/>
    <circle cx="108" cy="304" r="7" fill="#cbd5e1"/><circle cx="142" cy="282" r="7" fill="#cbd5e1"/><circle cx="176" cy="312" r="7" fill="#cbd5e1"/><circle cx="210" cy="292" r="7" fill="#cbd5e1"/>

    <path d="M278 244 L370 244" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>
    <text x="292" y="220" font-size="15" fill="#475569">collect</text>

    <rect x="390" y="128" width="210" height="230" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="424" y="164" font-size="19" font-weight="700" fill="#1d4ed8">dataset</text>
    <text x="424" y="192" font-size="15" fill="#475569">observed sample</text>
    <rect x="424" y="220" width="64" height="94" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="504" y="220" width="64" height="94" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="433" y="272" font-size="14" fill="#1d4ed8">records</text>
    <text x="513" y="272" font-size="14" fill="#1d4ed8">records</text>

    <path d="M612 244 L704 244" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>
    <text x="630" y="220" font-size="15" fill="#475569">split</text>

    <rect x="724" y="120" width="146" height="96" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="756" y="156" font-size="18" font-weight="700" fill="#047857">train</text>
    <text x="750" y="184" font-size="15" fill="#475569">learn patterns</text>
    <rect x="724" y="286" width="146" height="96" rx="12" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="759" y="322" font-size="18" font-weight="700" fill="#854d0e">test</text>
    <text x="746" y="350" font-size="15" fill="#475569">estimate quality</text>
    <path d="M796 226 L796 274" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6"/>
  </g>

  <rect x="208" y="430" width="504" height="44" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="240" y="458" font-family="Arial, sans-serif" font-size="16" fill="#334155">Test performance is an estimate, not a proof of all future behavior.</text>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
