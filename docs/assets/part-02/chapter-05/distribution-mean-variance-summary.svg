<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Distribution, mean, and variance</title>
  <desc id="desc">데이터 묶음의 분포, 평균, 분산이 각각 무엇을 요약하는지 보여 주는 차트입니다.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Distribution, mean, and variance summarize a group of values</text>
  <text x="42" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Distribution shows the shape. Mean shows a center. Variance shows spread around the center.</text>

  <line x1="92" y1="360" x2="820" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="92" y1="150" x2="92" y2="360" stroke="#94a3b8" stroke-width="2"/>

  <g fill="#dbeafe" stroke="#2563eb" stroke-width="2">
    <rect x="150" y="318" width="46" height="42" rx="4"/>
    <rect x="210" y="286" width="46" height="74" rx="4"/>
    <rect x="270" y="242" width="46" height="118" rx="4"/>
    <rect x="330" y="194" width="46" height="166" rx="4"/>
    <rect x="390" y="160" width="46" height="200" rx="4"/>
    <rect x="450" y="190" width="46" height="170" rx="4"/>
    <rect x="510" y="238" width="46" height="122" rx="4"/>
    <rect x="570" y="292" width="46" height="68" rx="4"/>
    <rect x="630" y="326" width="46" height="34" rx="4"/>
  </g>

  <line x1="415" y1="142" x2="415" y2="382" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="390" y="122" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#b91c1c">mean</text>

  <path d="M330 404 L500 404" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <polygon points="330,404 344,396 344,412" fill="#10b981"/>
  <polygon points="500,404 486,396 486,412" fill="#10b981"/>
  <text x="346" y="440" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#047857">spread around mean</text>

  <rect x="680" y="142" width="190" height="176" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="704" y="177" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Read it in order</text>
  <text x="704" y="210" font-family="Arial, sans-serif" font-size="15" fill="#475569">1. shape</text>
  <text x="704" y="238" font-family="Arial, sans-serif" font-size="15" fill="#475569">2. center</text>
  <text x="704" y="266" font-family="Arial, sans-serif" font-size="15" fill="#475569">3. spread</text>
  <text x="704" y="294" font-family="Arial, sans-serif" font-size="15" fill="#475569">4. outliers</text>
</svg>
