<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Choose a data structure by the question</title>
  <desc id="desc">A learning note shows four questions and maps each question to a different data structure: array, table, tree, or graph.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 600 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; }
      .question { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .array { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
      .table { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; }
      .tree { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; }
      .graph { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.8; }
      .arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="920" height="620" fill="#ffffff"/>
  <text x="34" y="44" class="title">Choose the structure by the question</text>
  <text x="34" y="72" class="subtitle">The same raw data can be reorganized when the question changes.</text>

  <rect x="34" y="112" width="852" height="394" rx="14" class="box"/>
  <text x="58" y="146" class="panel-title">Start with a question, then choose a reading shape</text>

  <g transform="translate(78 184)">
    <rect x="0" y="0" width="300" height="54" rx="10" class="question"/>
    <text x="18" y="24" class="label">Question: calculate values</text>
    <text x="18" y="44" class="small">Example: average score or vector length</text>
    <line x1="312" y1="27" x2="402" y2="27" class="arrow"/>
    <rect x="420" y="0" width="300" height="54" rx="10" class="array"/>
    <text x="438" y="24" class="label">Array</text>
    <text x="438" y="44" class="small">position, axis, numeric operation</text>
  </g>

  <g transform="translate(78 260)">
    <rect x="0" y="0" width="300" height="54" rx="10" class="question"/>
    <text x="18" y="24" class="label">Question: compare cases</text>
    <text x="18" y="44" class="small">Example: student rows and feature columns</text>
    <line x1="312" y1="27" x2="402" y2="27" class="arrow"/>
    <rect x="420" y="0" width="300" height="54" rx="10" class="table"/>
    <text x="438" y="24" class="label">Table</text>
    <text x="438" y="44" class="small">row, column, cell, dataset</text>
  </g>

  <g transform="translate(78 336)">
    <rect x="0" y="0" width="300" height="54" rx="10" class="question"/>
    <text x="18" y="24" class="label">Question: find a place in a hierarchy</text>
    <text x="18" y="44" class="small">Example: folder, chapter, category</text>
    <line x1="312" y1="27" x2="402" y2="27" class="arrow"/>
    <rect x="420" y="0" width="300" height="54" rx="10" class="tree"/>
    <text x="438" y="24" class="label">Tree</text>
    <text x="438" y="44" class="small">root, parent, child, path</text>
  </g>

  <g transform="translate(78 412)">
    <rect x="0" y="0" width="300" height="54" rx="10" class="question"/>
    <text x="18" y="24" class="label">Question: follow relationships</text>
    <text x="18" y="44" class="small">Example: link, recommendation, citation</text>
    <line x1="312" y1="27" x2="402" y2="27" class="arrow"/>
    <rect x="420" y="0" width="300" height="54" rx="10" class="graph"/>
    <text x="438" y="24" class="label">Graph</text>
    <text x="438" y="44" class="small">node, edge, neighbor, path</text>
  </g>

  <rect x="118" y="550" width="684" height="34" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="460" y="572" text-anchor="middle" class="small">A data structure is not only a container. It is a way to make one kind of question easier.</text>
</svg>
