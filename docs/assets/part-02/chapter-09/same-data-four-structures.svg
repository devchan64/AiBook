<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" role="img" aria-labelledby="title desc">
  <title id="title">Same student data in four structures</title>
  <desc id="desc">Student data can be read as an array of scores, a table of records, a tree of school classes, or a graph of friendships.</desc>
  <defs>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .panel-title { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; }
      .array { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .table { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; }
      .tree { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .graph { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>

  <rect width="920" height="660" fill="#ffffff"/>
  <text x="34" y="44" class="title">Same data, different structure</text>
  <text x="34" y="72" class="subtitle">The question decides whether student data looks like scores, records, hierarchy, or relations.</text>

  <rect x="34" y="104" width="402" height="176" rx="14" class="box"/>
  <text x="58" y="136" class="panel-title">Question: calculate scores</text>
  <text x="58" y="162" class="small">View as an array of values.</text>
  <g transform="translate(74 194)">
    <rect x="0" y="0" width="80" height="48" rx="8" class="array"/>
    <rect x="94" y="0" width="80" height="48" rx="8" class="array"/>
    <rect x="188" y="0" width="80" height="48" rx="8" class="array"/>
    <text x="40" y="30" text-anchor="middle" class="label">82</text>
    <text x="134" y="30" text-anchor="middle" class="label">75</text>
    <text x="228" y="30" text-anchor="middle" class="label">45</text>
    <text x="0" y="76" class="small">scores = [82, 75, 45]</text>
  </g>

  <rect x="484" y="104" width="402" height="176" rx="14" class="box"/>
  <text x="508" y="136" class="panel-title">Question: compare records</text>
  <text x="508" y="162" class="small">View as a table of rows and columns.</text>
  <g transform="translate(526 190)">
    <rect x="0" y="0" width="292" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="0" y1="28" x2="292" y2="28" class="line"/>
    <line x1="88" y1="0" x2="88" y2="88" class="line"/>
    <line x1="176" y1="0" x2="176" y2="88" class="line"/>
    <text x="18" y="19" class="label">name</text>
    <text x="110" y="19" class="label">score</text>
    <text x="198" y="19" class="label">label</text>
    <text x="18" y="51" class="small">Kim</text>
    <text x="112" y="51" class="small">82</text>
    <text x="198" y="51" class="small">pass</text>
    <text x="18" y="76" class="small">Park</text>
    <text x="112" y="76" class="small">45</text>
    <text x="198" y="76" class="small">fail</text>
  </g>

  <rect x="34" y="318" width="402" height="250" rx="14" class="box"/>
  <text x="58" y="350" class="panel-title">Question: show hierarchy</text>
  <text x="58" y="376" class="small">View as a school-class-student tree.</text>
  <g transform="translate(100 420)">
    <circle cx="122" cy="0" r="22" class="node"/>
    <text x="122" y="5" text-anchor="middle" class="label">School</text>
    <line x1="122" y1="22" x2="58" y2="56" class="line"/>
    <line x1="122" y1="22" x2="186" y2="56" class="line"/>
    <rect x="10" y="56" width="96" height="38" rx="8" class="tree"/>
    <rect x="138" y="56" width="96" height="38" rx="8" class="tree"/>
    <text x="58" y="80" text-anchor="middle" class="label">Class A</text>
    <text x="186" y="80" text-anchor="middle" class="label">Class B</text>
    <line x1="58" y1="94" x2="34" y2="124" class="line"/>
    <line x1="58" y1="94" x2="82" y2="124" class="line"/>
    <line x1="186" y1="94" x2="186" y2="124" class="line"/>
    <text x="34" y="142" text-anchor="middle" class="small">Kim</text>
    <text x="82" y="142" text-anchor="middle" class="small">Lee</text>
    <text x="186" y="142" text-anchor="middle" class="small">Park</text>
  </g>

  <rect x="484" y="318" width="402" height="250" rx="14" class="box"/>
  <text x="508" y="350" class="panel-title">Question: follow relations</text>
  <text x="508" y="376" class="small">View as a friendship graph.</text>
  <g transform="translate(584 410)">
    <line x1="40" y1="0" x2="150" y2="0" class="line"/>
    <line x1="150" y1="0" x2="240" y2="70" class="line"/>
    <line x1="40" y1="0" x2="240" y2="70" class="line"/>
    <circle cx="40" cy="0" r="24" class="node"/>
    <circle cx="150" cy="0" r="24" class="node"/>
    <circle cx="240" cy="70" r="24" class="node"/>
    <text x="40" y="5" text-anchor="middle" class="label">Kim</text>
    <text x="150" y="5" text-anchor="middle" class="label">Lee</text>
    <text x="240" y="75" text-anchor="middle" class="label">Park</text>
  </g>

  <rect x="96" y="610" width="728" height="30" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="460" y="630" text-anchor="middle" class="small">The same data can be reorganized when the question changes.</text>
</svg>
