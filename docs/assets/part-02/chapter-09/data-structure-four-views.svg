<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" role="img" aria-labelledby="title desc">
  <title id="title">Four data structure views</title>
  <desc id="desc">Array asks about position, table asks about rows and columns, tree asks about hierarchy, and graph asks about relationships.</desc>
  <defs>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .panel-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .green { fill: #ecfdf5; stroke: #10b981; }
      .orange { fill: #fff7ed; stroke: #f97316; }
      .purple { fill: #f5f3ff; stroke: #7c3aed; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 5 5; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .em { font-weight: 700; }
    </style>
  </defs>

  <rect width="920" height="660" fill="#ffffff"/>
  <text x="34" y="44" class="title">Four ways to read the same data</text>
  <text x="34" y="72" class="subtitle">Array, table, tree, and graph emphasize different questions.</text>

  <rect x="34" y="104" width="402" height="180" rx="14" class="box"/>
  <text x="58" y="136" class="panel-title">Array: position and axis</text>
  <text x="58" y="162" class="small">Question: where is the value?</text>
  <g transform="translate(64 186)">
    <rect x="0" y="0" width="56" height="42" rx="8" class="blue"/>
    <rect x="66" y="0" width="56" height="42" rx="8" class="blue"/>
    <rect x="132" y="0" width="56" height="42" rx="8" class="blue"/>
    <rect x="198" y="0" width="56" height="42" rx="8" class="blue"/>
    <text x="28" y="26" text-anchor="middle" class="label">0.12</text>
    <text x="94" y="26" text-anchor="middle" class="label">-0.03</text>
    <text x="160" y="26" text-anchor="middle" class="label">0.44</text>
    <text x="226" y="26" text-anchor="middle" class="label">0.18</text>
    <text x="0" y="66" class="small">index 0</text>
    <text x="198" y="66" class="small">index 3</text>
  </g>

  <rect x="484" y="104" width="402" height="180" rx="14" class="box"/>
  <text x="508" y="136" class="panel-title">Table: rows and columns</text>
  <text x="508" y="162" class="small">Question: which case and feature?</text>
  <g transform="translate(516 184)">
    <rect x="0" y="0" width="300" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
    <line x1="0" y1="28" x2="300" y2="28" class="line"/>
    <line x1="88" y1="0" x2="88" y2="84" class="line"/>
    <line x1="188" y1="0" x2="188" y2="84" class="line"/>
    <text x="18" y="19" class="label">name</text>
    <text x="110" y="19" class="label">score</text>
    <text x="210" y="19" class="label">label</text>
    <text x="18" y="52" class="small">Kim</text>
    <text x="118" y="52" class="small">82</text>
    <text x="210" y="52" class="small">pass</text>
    <text x="18" y="76" class="small">Park</text>
    <text x="118" y="76" class="small">45</text>
    <text x="210" y="76" class="small">fail</text>
  </g>

  <rect x="34" y="328" width="402" height="220" rx="14" class="box"/>
  <text x="58" y="360" class="panel-title">Tree: hierarchy</text>
  <text x="58" y="386" class="small">Question: what belongs under what?</text>
  <g transform="translate(92 424)">
    <circle cx="120" cy="0" r="24" class="node"/>
    <text x="120" y="5" text-anchor="middle" class="label">Book</text>
    <line x1="120" y1="24" x2="64" y2="58" class="line"/>
    <line x1="120" y1="24" x2="176" y2="58" class="line"/>
    <rect x="16" y="58" width="96" height="42" rx="8" class="green"/>
    <rect x="128" y="58" width="96" height="42" rx="8" class="green"/>
    <text x="64" y="84" text-anchor="middle" class="label">Part 1</text>
    <text x="176" y="84" text-anchor="middle" class="label">Part 2</text>
  </g>

  <rect x="484" y="328" width="402" height="220" rx="14" class="box"/>
  <text x="508" y="360" class="panel-title">Graph: relationship</text>
  <text x="508" y="386" class="small">Question: what is connected?</text>
  <g transform="translate(570 424)">
    <line x1="70" y1="0" x2="0" y2="66" class="line"/>
    <line x1="70" y1="0" x2="146" y2="60" class="line"/>
    <line x1="0" y1="66" x2="146" y2="60" class="line"/>
    <line x1="146" y1="60" x2="220" y2="18" class="line"/>
    <circle cx="70" cy="0" r="22" class="node"/>
    <circle cx="0" cy="66" r="22" class="node"/>
    <circle cx="146" cy="60" r="22" class="node"/>
    <circle cx="220" cy="18" r="22" class="node"/>
    <text x="70" y="5" text-anchor="middle" class="label">Kim</text>
    <text x="0" y="71" text-anchor="middle" class="label">Lee</text>
    <text x="146" y="65" text-anchor="middle" class="label">Park</text>
    <text x="220" y="23" text-anchor="middle" class="label">Choi</text>
  </g>

  <rect x="96" y="590" width="728" height="30" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="460" y="610" text-anchor="middle" class="small">The structure changes what becomes easy to ask, compute, compare, or follow.</text>
</svg>
