<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Changing slope of a curve</title>
  <desc id="desc">곡선 y = x^2에서 서로 다른 구간의 평균 변화율이 달라지는 모습을 보여 준다. 앞 구간보다 뒤 구간의 변화가 더 크다.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d0d7de; stroke-width: 1.2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .axis { stroke: #6b7280; stroke-width: 2; }
    .curve { stroke: #2563eb; stroke-width: 4; fill: none; }
    .secant-a { stroke: #059669; stroke-width: 3.4; fill: none; }
    .secant-b { stroke: #dc2626; stroke-width: 3.4; fill: none; }
    .point { fill: #111827; }
    .label { fill: #374151; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 650; }
    .small { fill: #4b5563; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
    .math { fill: #111827; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; }
  </style>

  <rect class="bg" width="760" height="430" />
  <text class="label" x="42" y="42">Curve slope: rate changes by interval</text>
  <rect class="panel" x="38" y="66" width="684" height="302" rx="8" />

  <g transform="translate(94,324)">
    <path class="grid" d="M0 -30 H560 M0 -60 H560 M0 -90 H560 M0 -120 H560 M0 -150 H560 M0 -180 H560 M0 -210 H560 M0 -240 H560 M80 0 V-250 M160 0 V-250 M240 0 V-250 M320 0 V-250 M400 0 V-250 M480 0 V-250" />
    <path class="axis" d="M0 0 H580 M0 0 V-250" />
    <path class="curve" d="M0 0 C72 -6, 114 -20, 160 -40 C220 -74, 278 -124, 320 -198 C344 -236, 358 -248, 370 -250" />

    <circle class="point" cx="0" cy="0" r="4.8" />
    <circle class="point" cx="80" cy="-10" r="4.8" />
    <circle class="point" cx="160" cy="-40" r="4.8" />
    <circle class="point" cx="240" cy="-90" r="4.8" />

    <path class="secant-a" d="M0 0 L80 -10" />
    <path class="secant-b" d="M160 -40 L240 -90" />

    <text class="small" x="22" y="-22">small change</text>
    <text class="small" x="172" y="-112">larger change</text>
    <text class="math" x="378" y="-224">y = x^2</text>
    <text class="math" x="378" y="-198">interval A: smaller slope</text>
    <text class="math" x="378" y="-172">interval B: larger slope</text>
  </g>

  <text class="small" x="52" y="398">On a curve, average rate of change depends on the interval.</text>
</svg>
