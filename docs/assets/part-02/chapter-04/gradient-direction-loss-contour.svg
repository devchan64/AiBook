<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Gradient direction on a loss contour</title>
  <desc id="desc">손실 함수의 등고선 위 한 지점에서 그래디언트 방향은 손실이 커지는 쪽이고, 반대 방향은 손실이 줄어드는 쪽임을 보여 준다.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d0d7de; stroke-width: 1.2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .axis { stroke: #6b7280; stroke-width: 2; }
    .contour1 { fill: none; stroke: #bfdbfe; stroke-width: 3; }
    .contour2 { fill: none; stroke: #93c5fd; stroke-width: 3; }
    .contour3 { fill: none; stroke: #60a5fa; stroke-width: 3; }
    .contour4 { fill: none; stroke: #2563eb; stroke-width: 3; }
    .arrow-red { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arrow-red); }
    .arrow-green { stroke: #059669; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
    .point { fill: #111827; }
    .target { fill: #2563eb; }
    .label { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 650; }
    .small { fill: #4b5563; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
    .math { fill: #111827; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669" />
    </marker>
  </defs>

  <rect class="bg" width="760" height="430" />
  <text class="label" x="42" y="42">Gradient points uphill; descent goes the other way</text>
  <rect class="panel" x="38" y="66" width="684" height="302" rx="8" />

  <g transform="translate(96,330)">
    <path class="grid" d="M0 -50 H420 M0 -100 H420 M0 -150 H420 M0 -200 H420 M0 -250 H420 M70 0 V-260 M140 0 V-260 M210 0 V-260 M280 0 V-260 M350 0 V-260" />
    <path class="axis" d="M0 0 H440 M0 0 V-270" />
    <ellipse class="contour1" cx="220" cy="-145" rx="180" ry="110" />
    <ellipse class="contour2" cx="220" cy="-145" rx="132" ry="80" />
    <ellipse class="contour3" cx="220" cy="-145" rx="84" ry="50" />
    <ellipse class="contour4" cx="220" cy="-145" rx="34" ry="22" />
    <circle class="target" cx="220" cy="-145" r="5" />
    <text class="math" x="238" y="-140">minimum</text>

    <circle class="point" cx="330" cy="-205" r="5" />
    <path class="arrow-red" d="M330 -205 L400 -242" />
    <path class="arrow-green" d="M330 -205 L262 -168" />

    <text class="math" x="402" y="-246">∇L</text>
    <text class="small" x="390" y="-222">loss up</text>
    <text class="math" x="250" y="-156">-∇L</text>
    <text class="small" x="250" y="-134">loss down</text>

    <text class="small" x="386" y="-12">w1</text>
    <text class="small" x="-24" y="-250">w2</text>
  </g>

  <g transform="translate(572,120)">
    <rect x="0" y="0" width="118" height="124" rx="8" fill="#ffffff" stroke="#d0d7de" />
    <line x1="18" y1="32" x2="48" y2="32" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)" />
    <text class="small" x="56" y="37">uphill</text>
    <line x1="18" y1="76" x2="48" y2="76" stroke="#059669" stroke-width="4" marker-end="url(#arrow-green)" />
    <text class="small" x="56" y="81">downhill</text>
  </g>

  <text class="small" x="52" y="398">Gradient gives local direction. To reduce loss, move against it.</text>
</svg>
