<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Vector calculus context for gradient</title>
  <desc id="desc">лІЎн„°н•ҙм„қм—җм„ң мҠӨм№јлқјмһҘ, к·ёлһҳл””м–ёнҠё, лІЎн„°мһҘмқҙ м–ҙл–»кІҢ м—°кІ°лҗҳлҠ”м§Җ мһ…л¬ё мҲҳмӨҖмңјлЎң ліҙм—¬ мӨҖлӢӨ.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d0d7de; stroke-width: 1.2; }
    .card { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.2; }
    .arrow { stroke: #6b7280; stroke-width: 2.6; fill: none; marker-end: url(#arrow-gray); }
    .mini { fill: none; stroke: #93c5fd; stroke-width: 3; }
    .vec { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
    .label { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 650; }
    .small { fill: #4b5563; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
    .math { fill: #111827; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; }
  </style>
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280" /></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb" /></marker>
  </defs>
  <rect class="bg" width="920" height="430" />
  <text class="label" x="42" y="42">Vector calculus: where the gradient belongs</text>
  <rect class="panel" x="38" y="66" width="844" height="302" rx="8" />

  <rect class="card" x="78" y="112" width="210" height="178" rx="8" />
  <text class="math" x="104" y="144">scalar field</text>
  <text class="small" x="104" y="170">one value at each point</text>
  <ellipse class="mini" cx="182" cy="226" rx="68" ry="36" />
  <ellipse class="mini" cx="182" cy="226" rx="38" ry="20" />
  <text class="math" x="120" y="272">L(w1, w2)</text>

  <path class="arrow" d="M300 201 H364" />
  <text class="math" x="314" y="188">вҲҮ</text>

  <rect class="card" x="382" y="112" width="210" height="178" rx="8" />
  <text class="math" x="408" y="144">gradient</text>
  <text class="small" x="408" y="170">local change direction</text>
  <path class="vec" d="M446 236 L528 184" />
  <circle cx="446" cy="236" r="5" fill="#111827" />
  <text class="math" x="446" y="272">вҲҮL = [вҲӮL/вҲӮw1, вҲӮL/вҲӮw2]</text>

  <path class="arrow" d="M604 201 H668" />

  <rect class="card" x="686" y="112" width="160" height="178" rx="8" />
  <text class="math" x="712" y="144">vector field</text>
  <text class="small" x="712" y="170">vectors over space</text>
  <path class="vec" d="M720 220 L756 196" />
  <path class="vec" d="M764 236 L800 210" />
  <path class="vec" d="M720 260 L754 242" />
  <path class="vec" d="M770 272 L810 252" />

  <text class="small" x="70" y="342">Vector calculus is the larger language. This section only needs the gradient as a local direction signal.</text>
</svg>
