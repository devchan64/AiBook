<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Constant slope of a linear function</title>
  <desc id="desc">직선 y = 2x + 1에서 서로 다른 두 구간 모두 Δx = 1, Δy = 2로 같은 기울기를 갖는 모습을 보여 준다.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d0d7de; stroke-width: 1.2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .axis { stroke: #6b7280; stroke-width: 2; }
    .line { stroke: #2563eb; stroke-width: 4; fill: none; }
    .rise { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
    .run { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
    .point { fill: #111827; }
    .label { fill: #374151; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 650; }
    .small { fill: #4b5563; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
    .math { fill: #111827; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669" />
    </marker>
  </defs>

  <rect class="bg" width="760" height="430" />
  <text class="label" x="42" y="42">Linear slope: same change at each interval</text>
  <rect class="panel" x="38" y="66" width="684" height="302" rx="8" />

  <g transform="translate(94,324)">
    <path class="grid" d="M0 -40 H560 M0 -80 H560 M0 -120 H560 M0 -160 H560 M0 -200 H560 M0 -240 H560 M80 0 V-250 M160 0 V-250 M240 0 V-250 M320 0 V-250 M400 0 V-250 M480 0 V-250" />
    <path class="axis" d="M0 0 H580 M0 0 V-250" />
    <path class="line" d="M0 -40 L80 -80 L160 -120 L240 -160 L320 -200 L400 -240" />

    <circle class="point" cx="0" cy="-40" r="4.8" />
    <circle class="point" cx="80" cy="-80" r="4.8" />
    <circle class="point" cx="160" cy="-120" r="4.8" />
    <circle class="point" cx="240" cy="-160" r="4.8" />

    <path class="run" d="M0 -40 H80" />
    <path class="rise" d="M80 -40 V-80" />
    <text class="small" x="26" y="-18">Δx = 1</text>
    <text class="small" x="92" y="-55">Δy = 2</text>

    <path class="run" d="M160 -120 H240" />
    <path class="rise" d="M240 -120 V-160" />
    <text class="small" x="184" y="-98">Δx = 1</text>
    <text class="small" x="252" y="-136">Δy = 2</text>

    <text class="math" x="386" y="-228">y = 2x + 1</text>
    <text class="math" x="386" y="-202">slope = Δy / Δx = 2</text>
  </g>

  <text class="small" x="52" y="398">A line keeps the same output change for the same input change.</text>
</svg>
