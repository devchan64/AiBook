site_name: AiBook
site_description: AI 재학습과 새로운 AI 패러다임 적응을 위한 정적 웹 책
site_author: devchan64
site_url: https://devchan64.github.io/AiBook/
repo_name: devchan64/AiBook
repo_url: https://github.com/devchan64/AiBook
edit_uri: edit/dev/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

nav:
  - 시작:
      - 소개: index.md
      - 책의 목차: book/table-of-contents.md
  - Part 1. AI 개론과 지형도:
      - 개요: parts/ai-overview.md
      - Chapter 1. AI란 무엇인가:
          - 1.1 AI라는 말의 범위: chapters/chapter-01/section-01.md
          - 1.2 AI가 다루는 문제: chapters/chapter-01/section-02.md
          - 1.3 AI, 머신러닝, 딥러닝, 생성형 AI의 관계: chapters/chapter-01/section-03.md
      - Chapter 2. AI의 역사와 패러다임 변화:
          - 2.1 기호 기반 AI와 규칙 기반 접근: chapters/chapter-02/section-01.md
          - 2.2 탐색, 지식 표현, 확률 추론: chapters/chapter-02/section-02.md
          - 2.3 머신러닝, 딥러닝, 생성형 AI로의 흐름: chapters/chapter-02/section-03.md
      - Chapter 3. 규칙에서 학습으로:
          - 3.1 규칙 기반 시스템의 강점과 한계: chapters/chapter-03/section-01.md
          - 3.2 데이터에서 패턴을 배운다는 것: chapters/chapter-03/section-02.md
          - 3.3 규칙 기반 접근(rule-based approach)과 표현 학습(representation learning): chapters/chapter-03/section-03.md
      - Chapter 4. 문제를 모델로 바꾼다는 것:
          - 4.1 모델(model, 모형)이라는 말에 익숙해지기: chapters/chapter-04/section-01.md
          - 4.2 입력(input), 출력(output), 데이터(data): chapters/chapter-04/section-02.md
          - 4.3 특징(feature), 표현(representation), 파라미터(parameter): chapters/chapter-04/section-03.md
          - 4.4 문제 정의가 모델을 결정하는 방식: chapters/chapter-04/section-04.md
      - Chapter 5. 학습(learning)과 모델 실행(inference):
          - 5.1 학습(learning)은 무엇을 바꾸는가: chapters/chapter-05/section-01.md
          - 5.2 모델 실행(inference)은 무엇을 실행하는가: chapters/chapter-05/section-02.md
          - 5.3 한국어 추론 표현의 혼동: chapters/chapter-05/section-03.md
      - Chapter 6. 불확실성과 확률적 판단:
          - 6.1 불완전한 정보와 예외가 많은 문제: chapters/chapter-06/section-01.md
          - 6.2 확률(probability), 불확실성(uncertainty), 확률적 과정(stochastic) 구분: chapters/chapter-06/section-02.md
          - 6.3 AI에서 확률적 판단이 쓰이는 곳: chapters/chapter-06/section-03.md
      - Chapter 7. 탐색과 휴리스틱:
          - 7.1 탐색 공간(search space)과 계산 한계(computational limit): chapters/chapter-07/section-01.md
          - 7.2 휴리스틱(heuristic)은 무엇을 줄이는가: chapters/chapter-07/section-02.md
          - 7.3 휴리스틱(heuristic)과 확률 모델(probabilistic model)의 차이: chapters/chapter-07/section-03.md
      - Chapter 8. 학습 유형의 기본 구분:
          - "8.1 지도학습(supervised learning): 입력(input)과 라벨(label)": chapters/chapter-08/section-01.md
          - "8.2 비지도학습(unsupervised learning): 구조(structure)와 표현(representation)": chapters/chapter-08/section-02.md
          - "8.3 강화학습(reinforcement learning): 행동(action)과 보상(reward)": chapters/chapter-08/section-03.md
      - Chapter 9. 딥러닝 패러다임의 확산:
          - "9.1 이미지 인식(image recognition)과 표현 학습(representation learning)": chapters/chapter-09/section-01.md
          - "9.2 객체 검출(object detection)과 음성 생성(speech generation) 사례": chapters/chapter-09/section-02.md
          - "9.3 LLM(large language model)의 직접 계보(direct lineage)와 주변 근거(surrounding evidence) 구분": chapters/chapter-09/section-03.md
      - Chapter 10. 생성형 AI 개론:
          - "10.1 분류(classification), 예측(prediction), 생성(generation)의 차이": chapters/chapter-10/section-01.md
          - "10.2 다음 출력 생성(next-output generation)의 직관": chapters/chapter-10/section-02.md
          - "10.3 생성 결과(output)의 품질(quality)과 위험(risk)": chapters/chapter-10/section-03.md
      - Chapter 11. LLM은 어디에서 왔는가:
          - "11.1 통계적 언어 모델(statistical language model)과 임베딩(embedding)": chapters/chapter-11/section-01.md
          - "11.2 RNN, Seq2Seq, Attention": chapters/chapter-11/section-02.md
          - "11.3 Transformer와 사전학습 LLM(pretrained LLM)": chapters/chapter-11/section-03.md
      - Chapter 12. 프롬프트와 LLM 사용 경험:
          - "12.1 프롬프트(prompt)는 무엇을 지정하는가": chapters/chapter-12/section-01.md
          - "12.2 지시(instruction), 맥락(context), 예시(example)": chapters/chapter-12/section-02.md
          - "12.3 프롬프트(prompt)의 한계(limit)와 평가(evaluation)": chapters/chapter-12/section-03.md
  - Part 2. 기초 복구:
      - 개요: parts/foundation.md
  - Part 3. 머신러닝:
      - 개요: parts/machine-learning.md
  - Part 4. 딥러닝:
      - 개요: parts/deep-learning.md
  - Part 5. LLM과 생성형 AI:
      - 개요: parts/llm-generative-ai.md
  - Part 6. 프로젝트:
      - 개요: projects/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ko
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      timezone: Asia/Seoul
      locale: ko
      fallback_to_build_date: true
  - minify:
      minify_html: true

extra_css:
  - stylesheets/extra.css
