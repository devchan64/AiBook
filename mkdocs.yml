site_name: AiBook
site_description: AI 재학습과 새로운 AI 패러다임 적응을 위한 정적 웹 책
site_author: devchan64
site_url: https://devchan64.github.io/AiBook/
repo_name: devchan64/AiBook
repo_url: https://github.com/devchan64/AiBook
edit_uri: edit/dev/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

nav:
  - 시작:
      - 소개: index.md
      - 책의 목차: book/table-of-contents.md
      - 기준 목차: authoring/table-of-contents.md
      - AI 개론 목차 조사: authoring/ai-intro-curriculum-survey.md
      - 딥러닝 패러다임과 LLM: authoring/deep-learning-paradigm.md
      - 휴리스틱과 AI적 사고: authoring/heuristics-and-ai-thinking.md
      - Codex 소개와 사용 원칙: authoring/codex.md
      - 시각화 작성 원칙: authoring/visuals.md
  - 로드맵:
      - 1장. AI 재학습 로드맵: chapters/chapter-01.md
  - Part 1. AI 개론과 지형도:
      - 개요: parts/ai-overview.md
  - Part 2. 기초 복구:
      - 개요: parts/foundation.md
  - Part 3. 머신러닝:
      - 개요: parts/machine-learning.md
  - Part 4. 딥러닝:
      - 개요: parts/deep-learning.md
  - Part 5. LLM과 생성형 AI:
      - 개요: parts/llm-generative-ai.md
  - Part 6. 프로젝트:
      - 개요: projects/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ko
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      timezone: Asia/Seoul
      locale: ko
      fallback_to_build_date: true
  - minify:
      minify_html: true

extra_css:
  - stylesheets/extra.css
