site_name: AiBook
site_description: AI 재학습과 새로운 AI 패러다임 적응을 위한 정적 웹 책
site_author: devchan64
site_url: https://devchan64.github.io/AiBook/
repo_name: devchan64/AiBook
repo_url: https://github.com/devchan64/AiBook
edit_uri: edit/dev/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

